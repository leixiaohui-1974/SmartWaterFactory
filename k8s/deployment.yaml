apiVersion: apps/v1
kind: Deployment
metadata:
  name: water-plant-app
  namespace: water-plant
  labels:
    app: water-plant-app
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: water-plant-app
  template:
    metadata:
      labels:
        app: water-plant-app
        version: v1
    spec:
      containers:
      - name: water-plant-app
        image: ghcr.io/your-username/smartwaterfactory:latest
        ports:
        - containerPort: 5000
          name: http
        - containerPort: 8080
          name: websocket
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: water-plant-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: water-plant-secrets
              key: redis-url
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: water-plant-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: config-volume
        configMap:
          name: water-plant-config
      - name: logs-volume
        emptyDir: {}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: water-plant-app-service
  namespace: water-plant
  labels:
    app: water-plant-app
spec:
  selector:
    app: water-plant-app
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  - name: websocket
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: water-plant-ingress
  namespace: water-plant
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - water-plant.example.com
    secretName: water-plant-tls
  rules:
  - host: water-plant.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: water-plant-app-service
            port:
              number: 80