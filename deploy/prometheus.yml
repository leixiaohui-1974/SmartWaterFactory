global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 水厂应用监控
  - job_name: 'water-plant-app'
    static_configs:
      - targets: ['water-plant-app:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Node Exporter (系统指标)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # PostgreSQL 监控
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis 监控
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Nginx 监控
  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # 自定义业务指标
  - job_name: 'water-quality-metrics'
    static_configs:
      - targets: ['water-plant-app:5000']
    metrics_path: '/api/metrics/water-quality'
    scrape_interval: 30s

  - job_name: 'control-system-metrics'
    static_configs:
      - targets: ['water-plant-app:5000']
    metrics_path: '/api/metrics/control-system'
    scrape_interval: 15s

  - job_name: 'performance-metrics'
    static_configs:
      - targets: ['water-plant-app:5000']
    metrics_path: '/api/metrics/performance'
    scrape_interval: 60s