version: '3.8'

# ==================================================
# SmartWaterFactory Docker Compose 配置 (简化版)
# ==================================================
# 此配置包含核心服务，适用于快速开发和测试
# 完整版配置（包括数据库、监控等）请使用 docker-compose.full.yml
#
# 使用方法:
#   开发环境: docker-compose up
#   生产环境: docker-compose -f docker-compose.full.yml up
# ==================================================

services:
  # 主应用服务
  water-plant-app:
    build: .
    container_name: water-plant-app
    ports:
      - "5000:5000"  # API服务端口
    environment:
      - WATER_PLANT_ENV=development
      - DEBUG=true
      - API_HOST=0.0.0.0
      - API_PORT=5000
      # 安全配置 - 生产环境请修改
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - OPERATOR_PASSWORD=${OPERATOR_PASSWORD:-op123}
      - USER_PASSWORD=${USER_PASSWORD:-user123}
      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_CONSOLE_LOG=true
      - ENABLE_FILE_LOG=true
    volumes:
      # 挂载日志目录
      - ./logs:/app/logs
      # 挂载数据目录
      - ./data:/app/data
      # 挂载配置目录（可选）
      - ./config:/app/config
    restart: unless-stopped
    networks:
      - water-plant-network
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

