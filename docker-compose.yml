version: '3.8'

services:
  # 主应用服务
  water-plant-app:
    build: .
    container_name: water-plant-app
    ports:
      - "5000:5000"
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/waterplant
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - water-plant-network

  # PostgreSQL 数据库
  postgres:
    image: postgres:13
    container_name: water-plant-db
    environment:
      - POSTGRES_DB=waterplant
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - water-plant-network

  # Redis 缓存
  redis:
    image: redis:6-alpine
    container_name: water-plant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - water-plant-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: water-plant-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf
      - ./deploy/ssl:/etc/nginx/ssl
    depends_on:
      - water-plant-app
    restart: unless-stopped
    networks:
      - water-plant-network

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: water-plant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - water-plant-network

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: water-plant-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - water-plant-network

  # 日志收集
  fluentd:
    image: fluent/fluentd:v1.14-debian-1
    container_name: water-plant-fluentd
    volumes:
      - ./deploy/fluentd.conf:/fluentd/etc/fluent.conf
      - ./logs:/var/log/water-plant
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    restart: unless-stopped
    networks:
      - water-plant-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  water-plant-network:
    driver: bridge